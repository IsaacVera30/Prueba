<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ESP32 Monitor de Presión Arterial</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #333;
    }

    .estado {
      margin-top: 20px;
      padding: 10px;
      font-weight: bold;
      color: white;
      border-radius: 5px;
      display: inline-block;
    }

    .autorizado {
      background-color: #28a745;
    }

    .detenido {
      background-color: #dc3545;
    }

    .resultado {
      margin-top: 30px;
      padding: 20px;
      background-color: white;
      border-radius: 10px;
      display: inline-block;
      text-align: left;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      margin: 15px;
      padding: 12px 25px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    .btn-verde {
      background-color: #28a745;
      color: white;
    }

    .btn-rojo {
      background-color: #dc3545;
      color: white;
    }

  </style>
</head>
<body>

  <h1>📟 ESP32 - Presión Arterial</h1>

  <div class="estado {{ 'autorizado' if autorizado else 'detenido' }}">
    Estado: {{ 'Autorizado' if autorizado else 'Detenido' }}
  </div>

  <div class="resultado">
    <p><strong>Presión Sistólica (SYS):</strong> {{ estimacion.sys }} mmHg</p>
    <p><strong>Presión Diastólica (DIA):</strong> {{ estimacion.dia }} mmHg</p>
    <p><strong>Nivel de Presión:</strong> {{ estimacion.nivel }}</p>
  </div>

  <div>
    <form action="/api/autorizar" method="get">
      <button type="submit" class="btn-verde">✅ Autorizar Registro</button>
    </form>

    <form action="/api/detener" method="get">
      <button type="submit" class="btn-rojo">⛔ Detener Registro</button>
    </form>
  </div>

</body>
</html>
