<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Monitoreo de Salud</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        h1 { color: #333; }
        .data-section { margin-bottom: 30px; }
        .data-item { margin-bottom: 10px; }
        .highlight { font-weight: bold; font-size: 1.2em; color: #0066cc; }
        #contador-capturas { font-weight: bold; color: #009933; }
    </style>
</head>
<body>
    <h1>Panel de Monitoreo de Salud</h1>

    <div class="data-section">
        <h2>Lecturas del Sensor</h2>
        <div class="data-item">HR Crudo: <span id="hr_crudo" class="highlight">--</span></div>
        <div class="data-item">HR PROMEDIO SENSOR: <span id="hr_promedio" class="highlight">--</span></div>
        <div class="data-item">SpO2 SENSOR: <span id="spo2_sensor" class="highlight">--</span></div>
        <div class="data-item">IR: <span id="ir" class="highlight">--</span></div>
        <div class="data-item">RED: <span id="red" class="highlight">--</span></div>
    </div>

    <div class="data-section">
        <h2>Predicción ML</h2>
        <div class="data-item">SYS ML: <span id="sys_ml" class="highlight">--</span></div>
        <div class="data-item">DIA ML: <span id="dia_ml" class="highlight">--</span></div>
        <div class="data-item">HR ML: <span id="hr_ml" class="highlight">--</span></div>
        <div class="data-item">SpO2 ML: <span id="spo2_ml" class="highlight">--</span></div>
        <div class="data-item">Estado: <span id="estado_ml" class="highlight">--</span></div>
    </div>

    <div class="data-section">
        <button onclick="guardarMuestra()">Guardar Muestra de Entrenamiento</button>
        <p>Muestras registradas: <span id="contador-capturas">0</span> / 15</p>
    </div>

    <script>
        function actualizarDatos() {
            fetch("/api/ultimos_datos")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("hr_crudo").innerText = data.hr_crudo ?? "--";
                    document.getElementById("hr_promedio").innerText = data.hr_promedio_sensor ?? "--";
                    document.getElementById("spo2_sensor").innerText = data.spo2_sensor ?? "--";
                    document.getElementById("ir").innerText = data.ir ?? "--";
                    document.getElementById("red").innerText = data.red ?? "--";

                    document.getElementById("sys_ml").innerText = data.sys_ml ?? "--";
                    document.getElementById("dia_ml").innerText = data.dia_ml ?? "--";
                    document.getElementById("hr_ml").innerText = data.hr_ml ?? "--";
                    document.getElementById("spo2_ml").innerText = data.spo2_ml ?? "--";
                    document.getElementById("estado_ml").innerText = data.estado ?? "--";
                });
        }

        function actualizarContador() {
            fetch("/api/registro_count")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("contador-capturas").innerText = data.restantes ?? "0";
                });
        }

        function guardarMuestra() {
            const hr_ref = prompt("Ingrese HR de referencia:");
            const sys_ref = prompt("Ingrese SYS de referencia:");
            const dia_ref = prompt("Ingrese DIA de referencia:");

            fetch("/api/guardar_muestra", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    hr_referencia: parseInt(hr_ref),
                    pas_referencia: parseInt(sys_ref),
                    pad_referencia: parseInt(dia_ref)
                })
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message || "Datos registrados correctamente.");
                actualizarContador();
            });
        }

        setInterval(actualizarDatos, 2000);
        setInterval(actualizarContador, 2000);
        window.onload = () => {
            actualizarDatos();
            actualizarContador();
        };
    </script>
</body>
</html>
