<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estimación por ML</title>
</head>
<body>
    <div style="font-family: sans-serif; text-align: center; padding: 30px;">
        <h2>🧠 Estimación por ML</h2>
        <p><strong>Sistólica:</strong> {{ estimacion.sys }} mmHg</p>
        <p><strong>Diastólica:</strong> {{ estimacion.dia }} mmHg</p>
        {% if autorizado %}
            <a href="/api/detener"><button style="background:red;color:white;padding:10px 20px;">🛑 Detener Registro</button></a>
        {% else %}
            <a href="/api/autorizar"><button style="background:green;color:white;padding:10px 20px;">✅ Autorizar Registro</button></a>
        {% endif %}
    </div>
</body>
</html>
