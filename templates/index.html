<table id="medicionesTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Paciente</th>
            <th>SYS</th>
            <th>DIA</th>
            <th>Nivel</th>
        </tr>
    </thead>
    <tbody>
        <tr><td colspan="5" style="text-align:center;">Cargando...</td></tr>
    </tbody>
</table>

<script>
    // ...
    function actualizarTablaMediciones() {
        fetch('/api/ultimas_mediciones').then(res => res.json()).then(data => {
            const tbody = document.getElementById('medicionesTable').querySelector('tbody');
            tbody.innerHTML = ''; // Limpiar tabla antes de rellenar

            if (data && data.length > 0) {
                data.forEach(med => {
                    let row = tbody.insertRow();
                    // MODIFICADO: El orden y contenido de las celdas coincide con la nueva cabecera
                    row.insertCell().textContent = med.id;            // Columna #
                    row.insertCell().textContent = med.id_paciente;   // Columna PACIENTE ID
                    row.insertCell().textContent = parseFloat(med.sys).toFixed(2);
                    row.insertCell().textContent = parseFloat(med.dia).toFixed(2);
                    row.insertCell().textContent = med.nivel;
                });
            } else {
                // El colspan se actualiza a 5 para el mensaje de "No hay datos"
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No hay datos.</td></tr>';
            }
        });
    }

    // ... (el resto de tu script se mantiene igual)
</script>
