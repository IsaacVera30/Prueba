<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Monitor de PA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        :root { /* ... tus variables de color ... */ }
        body { font-family: 'Roboto', sans-serif; /* ... etc ... */ }
        /* ... Todos tus demás estilos ... */
    </style>
</head>
<body>
    <h1 class="main-title">Panel de Control del Monitor de PA</h1>

    <div class="container">
        <h2>Estado y Controles</h2>
        <div id="auth-status-display" class="status-display">Cargando...</div>
        <button id="toggleAuthButton">Cargando...</button>
    </div>

    <div class="container">
        <h2>Última Estimación Recibida (Tiempo Real)</h2>
        <div class="data-grid">
            <div class="data-item"><strong>PAS (Sistólica)</strong> <span id="sysVal">---</span> mmHg</div>
            <div class="data-item"><strong>PAD (Diastólica)</strong> <span id="diaVal">---</span> mmHg</div>
            <div class="data-item"><strong>SpO2</strong> <span id="spo2Val">---</span> %</div>
            <div class="data-item"><strong>HR</strong> <span id="hrVal">---</span> bpm</div>
            <div class="data-item"><strong>Nivel</strong> <span id="nivelVal">---</span></div>
            <div class="data-item"><strong>Timestamp</strong> <span id="timestampVal">---</span></div>
        </div>
    </div>

    <div class="container">
        <h2>Últimas 20 Mediciones Guardadas</h2>
        <table id="medicionesTable">
            <thead>
                <tr><th>ID</th><th>Paciente</th><th>PAS</th><th>PAD</th><th>HR</th><th>SpO2</th><th>Nivel</th></tr>
            </thead>
            <tbody>
                <tr><td colspan="7" style="text-align:center;">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Referencias a Elementos UI ---
            const ui = {
                authButton: document.getElementById('toggleAuthButton'),
                authStatus: document.getElementById('auth-status-display'),
                sysVal: document.getElementById('sysVal'),
                diaVal: document.getElementById('diaVal'),
                spo2Val: document.getElementById('spo2Val'),
                hrVal: document.getElementById('hrVal'),
                nivelVal: document.getElementById('nivelVal'),
                timestampVal: document.getElementById('timestampVal'),
                medicionesTbody: document.getElementById('medicionesTable').querySelector('tbody')
            };

            let estadoAutorizadoGeneral = false;

            // --- Conexión con el servidor Socket.IO ---
            const socket = io();

            // --- Escuchadores de Eventos del Servidor ---

            // Se activa cuando el servidor envía una nueva medición
            socket.on('update_data', function(data) {
                console.log('Datos recibidos:', data);
                ui.sysVal.textContent = data.sys || '---';
                ui.diaVal.textContent = data.dia || '---';
                ui.spo2Val.textContent = data.spo2 || '---';
                ui.hrVal.textContent = data.hr || '---';
                ui.nivelVal.textContent = data.nivel || '---';
                ui.timestampVal.textContent = data.timestamp || '---';
            });

            // Se activa cuando cambia el estado de autorización en el servidor
            socket.on('status_update', function(data) {
                estadoAutorizadoGeneral = data.autorizado;
                actualizarUIAutorizacion();
            });

            // Se activa cuando se guarda un nuevo registro para refrescar la tabla
            socket.on('new_record_saved', function() {
                console.log('Nuevo registro guardado, actualizando tabla...');
                actualizarTablaMediciones();
            });


            // --- Lógica de la Interfaz ---

            function actualizarUIAutorizacion() {
                if (estadoAutorizadoGeneral) {
                    ui.authButton.textContent = 'Detener Registro en BD';
                    ui.authButton.className = 'btn-toggle-on';
                    ui.authStatus.textContent = 'Registro en Base de Datos: AUTORIZADO';
                    ui.authStatus.className = 'status-display status-autorizado';
                } else {
                    ui.authButton.textContent = 'Autorizar Registro en BD';
                    ui.authButton.className = 'btn-toggle-off';
                    ui.authStatus.textContent = 'Registro en Base de Datos: DETENIDO';
                    ui.authStatus.className = 'status-display status-detenido';
                }
            }

            function toggleAutorizacion() {
                fetch('/api/autorizacion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ autorizado: !estadoAutorizadoGeneral }),
                }).catch(error => console.error('Error al cambiar autorización:', error));
            }

            function actualizarTablaMediciones() {
                fetch('/api/ultimas_mediciones')
                    .then(response => response.json())
                    .then(data => {
                        ui.medicionesTbody.innerHTML = ''; // Limpiar tabla
                        if (data && data.length > 0) {
                            data.forEach(med => {
                                let row = ui.medicionesTbody.insertRow();
                                row.insertCell().textContent = med.id;
                                row.insertCell().textContent = med.id_paciente;
                                row.insertCell().textContent = med.sys;
                                row.insertCell().textContent = med.dia;
                                row.insertCell().textContent = med.hr;
                                row.insertCell().textContent = med.spo2;
                                row.insertCell().textContent = med.nivel;
                            });
                        } else {
                            let row = ui.medicionesTbody.insertRow();
                            let cell = row.insertCell();
                            cell.colSpan = 7;
                            cell.textContent = 'No hay mediciones guardadas.';
                            cell.style.textAlign = 'center';
                        }
                    }).catch(error => console.error('Error al cargar tabla:', error));
            }

            // --- Inicialización ---
            ui.authButton.addEventListener('click', toggleAutorizacion);

            // Cargar estado inicial del servidor
            fetch('/api/autorizacion')
                .then(response => response.json())
                .then(data => {
                    estadoAutorizadoGeneral = data.autorizado;
                    actualizarUIAutorizacion();
                });

            // Cargar tabla inicial
            actualizarTablaMediciones();
        });
    </script>
</body>
</html>
